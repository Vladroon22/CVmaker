<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ CV Maker</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #1a2639 0%, #2a3b4c 45%, #3e5c6b 100%);
            background-attachment: fixed;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* декоративные элементы — яркие акценты */
        body::before {
            content: "";
            position: absolute;
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, rgba(255, 215, 120, 0.45) 0%, rgba(255, 140, 200, 0.2) 80%);
            border-radius: 50%;
            top: -80px;
            right: -60px;
            z-index: 0;
            filter: blur(70px);
            animation: floatGlow 12s infinite alternate ease-in-out;
        }

        body::after {
            content: "";
            position: absolute;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #6ec3ff30 0%, #a17fe030 70%);
            border-radius: 50%;
            bottom: -100px;
            left: -80px;
            z-index: 0;
            filter: blur(80px);
            animation: floatGlow2 15s infinite alternate;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); opacity: 0.7; }
            100% { transform: translate(-40px, 30px) scale(1.2); opacity: 0.9; }
        }
        @keyframes floatGlow2 {
            0% { transform: translate(0, 0) scale(1); opacity: 0.6; }
            100% { transform: translate(50px, -40px) scale(1.3); opacity: 0.85; }
        }

        /* ===== MAIN CARD ===== */
        .content {
            width: 100%;
            max-width: 460px;
            position: relative;
            z-index: 10;
            perspective: 1200px;
        }

        .forms-container {
            transition: all 0.2s ease;
        }

        .registration-form {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(18px) saturate(180%);
            -webkit-backdrop-filter: blur(18px) saturate(180%);
            background: linear-gradient(145deg, rgba(255,255,255,0.92) 0%, rgba(250, 248, 255, 0.88) 100%);
            border-radius: 36px;
            padding: 2.2rem 2rem 2.2rem;
            box-shadow: 0 30px 50px -10px rgba(0, 0, 0, 0.35),
                        0 0 0 1px rgba(255, 255, 255, 0.2) inset,
                        0 8px 20px rgba(255, 215, 150, 0.15);
            border: 1px solid rgba(255,255,240,0.3);
            transition: transform 0.25s ease, box-shadow 0.4s;
            animation: cardAppear 0.5s cubic-bezier(0.2, 0.9, 0.3, 1);
        }

        @keyframes cardAppear {
            0% { opacity: 0; transform: translateY(20px) scale(0.97); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .registration-form:hover {
            box-shadow: 0 35px 55px -12px #1e2f3f, 0 0 0 1.5px rgba(255, 220, 150, 0.3) inset;
        }

        /* заголовки — сочный градиент */
        h2 {
            text-align: center;
            margin-bottom: 1.8rem;
            font-weight: 700;
            font-size: 2.1rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #1e2b3c, #3f2e4e, #1f4e6f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: relative;
        }

        h2::after {
            content: "";
            display: block;
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, #f6b26b, #f4a261, #d08c5b);
            margin: 10px auto 0;
            border-radius: 20px;
        }

        /* поля ввода */
        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-left: 8px;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #2c3e4e;
            opacity: 0.8;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border: 1.5px solid rgba(180, 200, 220, 0.6);
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 500;
            color: #14222e;
            transition: all 0.25s;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.02), 0 2px 3px rgba(0,0,0,0.02);
        }

        .input-group input:focus {
            border-color: #e5985c;
            outline: none;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 0 5px rgba(244, 162, 97, 0.15), inset 0 2px 5px rgba(0,0,0,0.02);
            transform: scale(1.01);
        }

        .input-group input::placeholder {
            color: #5f7481;
            font-weight: 400;
            opacity: 0.7;
        }

        /* КНОПКИ — яркие, градиентные */
        .btn {
            width: 100%;
            padding: 15px 18px;
            background: linear-gradient(145deg, #e48c4b, #cf7a3a);
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 12px 20px -8px rgba(180, 90, 40, 0.4), 0 3px 0 #9f5e2e inset, 0 -2px 5px rgba(255,215,140,0.4) inset;
            transition: all 0.2s;
            letter-spacing: 0.8px;
            margin-top: 8px;
            border: 1px solid rgba(255, 215, 150, 0.5);
        }

        .btn:hover {
            background: linear-gradient(145deg, #f39c5c, #e0843e);
            box-shadow: 0 16px 28px -10px #b45f2e, 0 3px 0 #9e5d2d inset;
            transform: translateY(-3px);
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 6px 12px -4px #a5521e, 0 1px 0 #7e4826 inset;
        }

        /* переключатели (Sign Up / Sign In) — кастомные яркие лейблы */
        .h4 {
            margin-top: 1.8rem;
            text-align: center;
            color: #2c4053;
            font-weight: 500;
            font-size: 1rem;
            letter-spacing: 0.3px;
            opacity: 0.9;
        }

        /* общие стили для ярлыков-кнопок */
        .lblUp, .lblIn {
            display: inline-block;
            width: auto;
            min-width: 140px;
            padding: 12px 24px;
            margin: 12px auto 0;
            background: linear-gradient(125deg, #2e5a7f, #1f3f5c);
            color: #fcf3e6;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 8px 18px -5px #102433, 0 0 0 1px #b9d6f0 inset;
            transition: 0.2s;
            letter-spacing: 0.8px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 225, 180, 0.3);
        }

        /* убираем странные огромные margin-left из исходника — центрируем */
        .lblUp, .lblIn {
            margin-left: 0;   
            width: 100%;
            max-width: 220px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .lblUp:hover, .lblIn:hover {
            background: linear-gradient(125deg, #3e6d99, #264b6b);
            box-shadow: 0 12px 22px -6px #0e1f2f, 0 0 0 2px #efcba1 inset;
            transform: scale(1.02) translateY(-2px);
            color: white;
        }

        .lblUp:active, .lblIn:active {
            transform: scale(0.98);
        }

        /* переключение форм — чекбокс спрятан, но управляет видимостью */
        #signUpForm {
            display: none;
        }

        #toggleSignUp:checked ~ .forms-container #signInForm {
            display: none;
        }

        #toggleSignUp:checked ~ .forms-container #signUpForm {
            display: block;
        }

        /* блок ошибки (если будет) — теперь стильный */
        .error {
            background: rgba(220, 50, 60, 0.15);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            color: #fee;
            font-weight: 500;
            padding: 14px 22px;
            border-radius: 60px;
            margin-top: 25px;
            text-align: center;
            border-left: 8px solid #f75c6c;
            box-shadow: 0 8px 18px rgba(160, 20, 20, 0.2);
            border: 1px solid rgba(255, 140, 140, 0.5);
            color: #360e0e;
            background: #ffe1deec;
            font-weight: 600;
            max-width: 460px;
            margin-left: auto;
            margin-right: auto;
        }

        /* адаптация */
        @media (max-width: 500px) {
            .registration-form {
                padding: 1.8rem 1.5rem;
                border-radius: 32px;
            }
            h2 { font-size: 1.9rem; }
        }

        /* дополнительные детали — иконки (псевдо) */
        .input-group {
            position: relative;
        }

        /* небольшая анимация перехода форм */
        #signInForm, #signUpForm {
            animation: fadeSwitch 0.3s ease;
        }

        @keyframes fadeSwitch {
            0% { opacity: 0.4; transform: translateX(-5px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        /* кастомный чекбокс — невидимый, но рабочий */
        #toggleSignUp {
            display: none;
        }

        /* улучшим видимость текста подсказок */
        .h4 + label {
            margin-top: 8px;
        }

        /* эмодзи-акценты */
        .registration-form h2::before {
            content: "✧ ";
            font-weight: 300;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: #d49b6a;
            font-size: 1.8rem;
        }
        .registration-form h2::after {
            content: "";
        }
        /* Второй заголовок тоже украсим */
        #signUpForm h2::before {
            content: "✨ ";
        }

        /* мелкие правки */
        .btn, .lblUp, .lblIn {
            user-select: none;
        }

        /* дополнительный яркий блик */
        .content::after {
            content: "📄 CV Maker";
            position: absolute;
            bottom: -35px;
            left: 0;
            right: 0;
            text-align: center;
            font-weight: 600;
            color: rgba(255, 240, 210, 0.6);
            letter-spacing: 4px;
            font-size: 0.9rem;
            text-transform: uppercase;
            backdrop-filter: blur(2px);
        }
    </style>
</head>
<body>   
    <div class="content">
        <!-- чекбокс управляет переключением между формами -->
        <input type="checkbox" id="toggleSignUp">

        <div class="forms-container">
            <!-- ===== SIGN IN ===== -->
            <div id="signInForm" class="registration-form">
                <h2>Sign In</h2>
                <form action="/sign-in" method="POST">
                    <div class="input-group">
                        <label for="signInEmail">📧 Email</label>
                        <input type="email" id="signInEmail" name="email" placeholder="your@email.com" required>
                    </div>
                    <div class="input-group">
                        <label for="signInPassword">🔒 Password</label>
                        <input type="password" id="signInPassword" name="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn">🚀 Sign In</button>
                </form> 
                <h4 class="h4">✨ New here?</h4>
                <!-- Яркая кнопка-переключатель на Sign Up -->
                <label class="lblUp" for="toggleSignUp">🌟 Create account</label>
            </div>

            <!-- ===== SIGN UP ===== -->
            <div id="signUpForm" class="registration-form">
                <h2>Sign Up</h2>
                <form action="/sign-up" method="POST">
                    <div class="input-group">
                        <label for="username">👤 Username</label>
                        <input type="text" id="username" name="username" placeholder="cool_nickname" required>
                    </div>
                    <div class="input-group">
                        <label for="signUpEmail">📧 Email</label>
                        <input type="email" id="signUpEmail" name="email" placeholder="hello@domain.com" required>
                    </div>
                    <div class="input-group">
                        <label for="signUpPassword">🔐 Password</label>
                        <input type="password" id="signUpPassword" name="password" placeholder="strong pass" required>
                    </div>
                    <button type="submit" class="btn">🌈 Sign Up</button>
                </form>
                <h4 class="h4">Already with us?</h4>
                <!-- Переключатель на Sign In -->
                <label class="lblIn" for="toggleSignUp">🔑 Sign In</label>
            </div>
        </div>

        <!-- блок для отображения ошибки (если передаётся) -->
        {{if .Error}}
            <div class="error">⚠️ {{.Error}}</div>
        {{end}}
        
        <!-- Дополнительный декоративный блок, если ошибки нет — для красоты оставим скрытое место? Но оставим возможность показа -->
    </div>

    <!-- маленькая фишка: при загрузке фоновая анимация, всё в одном файле -->
</body>
</html>
